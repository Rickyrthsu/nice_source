name: Run Anime Scraper

on:
  # 允許你從 GitHub 網頁端手動點擊 "Run workflow" 觸發
  workflow_dispatch: 
  # 當有程式碼推送到 main 分支時自動觸發 (可依需求註解掉)
  push:
    branches:
      - main

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 檢出程式碼 (Checkout Repository)
        uses: actions/checkout@v4

      - name: 🐍 設定 Python 環境 (Set up Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 可依你的開發環境調整版本

      - name: 📦 安裝 Python 相依套件 (Install Dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          # 若你有其他套件，可使用：pip install -r requirements.txt

      - name: 🌐 安裝 Playwright 瀏覽器與系統依賴 (Install Playwright Browsers)
        # --with-deps 是關鍵，它會自動補齊 Ubuntu 跑 Chromium 所需的系統函式庫
        run: playwright install chromium --with-deps

      - name: 🚀 執行爬蟲腳本 (Run scraper script)
        # 確保路徑與你的專案結構一致
        run: python scripts/scrape_anime.py