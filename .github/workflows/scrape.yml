name: 新增收藏 (Add Collection)

on:
  workflow_dispatch:
    inputs:
      collection_type:
        description: '請選擇要新增的資料類別'
        required: true
        type: choice
        options:
          - 漫畫
          - 影片
          - 動漫
          - Porn
          - 角色
      collection_value:
        description: '格式：漫畫/影片填「番號」、動漫/Porn填「完整網址」、角色填「人名或Pornhub網址」'
        required: true
        type: string

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 Pillow playwright playwright-stealth
          # 關鍵：在 GitHub Actions 系統中安裝 Chromium 瀏覽器核心
          playwright install chromium
          
      - name: Run Comic Scraper
        if: github.event.inputs.collection_type == '漫畫'
        env:
          COLLECTION_TYPE: ${{ github.event.inputs.collection_type }}
          COLLECTION_VALUE: ${{ github.event.inputs.collection_value }}
        run: python scripts/scrape_comic.py
          
      - name: Run Video Scraper (MissAV)
        if: github.event.inputs.collection_type == '影片'
        env:
          COLLECTION_TYPE: ${{ github.event.inputs.collection_type }}
          COLLECTION_VALUE: ${{ github.event.inputs.collection_value }}
        run: python scripts/scrape_video.py
          
      - name: Run Porn Scraper (Pornhub)
        if: github.event.inputs.collection_type == 'Porn'
        env:
          COLLECTION_TYPE: ${{ github.event.inputs.collection_type }}
          COLLECTION_VALUE: ${{ github.event.inputs.collection_value }}
        run: python scripts/scrape_video.py

      - name: Run Anime Scraper
        if: github.event.inputs.collection_type == '動漫'
        env:
          COLLECTION_TYPE: ${{ github.event.inputs.collection_type }}
          COLLECTION_VALUE: ${{ github.event.inputs.collection_value }}
        run: python scripts/scrape_anime.py

      - name: Run Actor Scraper
        if: github.event.inputs.collection_type == '角色'
        env:
          COLLECTION_TYPE: ${{ github.event.inputs.collection_type }}
          COLLECTION_VALUE: ${{ github.event.inputs.collection_value }}
        run: python scripts/scrape_actor.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): 自動更新收藏"
          file_pattern: "data.json images"